services:
  mongo:
    image: mongo:7
    container_name: farmer-survey-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmer-survey-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/farmer_survey
      MONGODB_DB_NAME: farmer_survey
      JWT_SECRET: dev-jwt-secret-change-this
      WHATSAPP_VERIFY_TOKEN: farmer_survey_pilot_2026

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: farmer-survey-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:

